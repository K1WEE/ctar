<div class="bg-white/70 dark:bg-brand-card p-4 rounded-2xl mt-6 border border-slate-200 dark:border-white/10">

  <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3">
    <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
      <i class="fa-solid fa-chart-line text-brand-accent"></i>
      {{ i18n.t('detail.progressTrend') }}
    </h2>
    <div class="flex space-x-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg self-start max-w-full overflow-x-auto">
      <button 
        class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all"
        [class.bg-white]="viewMode === 'day'" [class.dark:bg-slate-600]="viewMode === 'day'" [class.shadow-sm]="viewMode === 'day'"
        [class.text-brand-accent]="viewMode === 'day'" [class.text-slate-500]="viewMode !== 'day'"
        (click)="setViewMode('day')">
        {{ i18n.t('detail.day') }}
      </button>
      <button 
        class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all"
        [class.bg-white]="viewMode === 'week'" [class.dark:bg-slate-600]="viewMode === 'week'" [class.shadow-sm]="viewMode === 'week'"
        [class.text-brand-accent]="viewMode === 'week'" [class.text-slate-500]="viewMode !== 'week'"
        (click)="setViewMode('week')">
        {{ i18n.t('detail.week') }}
      </button>
      <button 
        class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all"
        [class.bg-white]="viewMode === 'month'" [class.dark:bg-slate-600]="viewMode === 'month'" [class.shadow-sm]="viewMode === 'month'"
        [class.text-brand-accent]="viewMode === 'month'" [class.text-slate-500]="viewMode !== 'month'"
        (click)="setViewMode('month')">
        {{ i18n.t('detail.month') }}
      </button>
    </div>
  </div>

  <canvas id="progressChart" class="w-full h-48"></canvas>

  <div class="mt-3 text-sm text-emerald-500 dark:text-emerald-400 font-semibold flex justify-between" *ngIf="getBestDay() as best">
    <span>Best record:</span>
    <span>{{ best.day }} ({{ best.avg_force | number:'1.0-1' }} N)</span>
  </div>

</div>
